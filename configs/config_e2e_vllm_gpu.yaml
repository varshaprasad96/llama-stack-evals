# Config E2E: Llama Stack with vLLM GPU inference + sentence-transformers embeddings
# Used for end-to-end latency benchmarks on OpenShift (Experiment 5)
#
# Infrastructure:
#   - vLLM serving meta-llama/Llama-3.2-1B-Instruct on NVIDIA T4 GPU
#   - Llama Stack running on CPU with inline sentence-transformers and sqlite-vec
#   - OpenShift 4.21, g4dn.2xlarge instance
version: "2"
image_name: starter
apis:
  - inference
  - vector_io
providers:
  inference:
    - provider_id: vllm
      provider_type: remote::vllm
      config:
        base_url: ${env.VLLM_URL:=http://vllm.vllm.svc.cluster.local:8000/v1}
    - provider_id: sentence-transformers
      provider_type: inline::sentence-transformers
      config: {}
  vector_io:
    - provider_id: sqlite-vec
      provider_type: inline::sqlite-vec
      config:
        db_path: ${env.SQLITE_STORE_DIR:=/tmp}/sqlite_vec.db
        persistence:
          backend: kv_default
          namespace: vector_io::sqlite_vec
models:
  - model_id: meta-llama/Llama-3.2-1B-Instruct
    provider_id: vllm
    provider_model_id: meta-llama/Llama-3.2-1B-Instruct
  - model_id: all-MiniLM-L6-v2
    provider_id: sentence-transformers
    provider_model_id: all-MiniLM-L6-v2
    model_type: embedding
    metadata:
      embedding_dimension: 384
